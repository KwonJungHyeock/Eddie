<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>EDDIE Visual Prototype v0.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;500;700;900&family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #02040c;
  --primary: #00D9FF;
  --primary-glow: rgba(0, 217, 255, 0.4);
  --aqua: #00FFE5;
  --aqua-glow: rgba(0, 255, 229, 0.5);
  --amber: #FFB845;
  --amber-glow: rgba(255, 184, 69, 0.5);
  --steel: #5A8FA8;
  --text-primary: #E6F4FF;
  --text-secondary: #8AB8D4;
  --text-muted: #3A5A78;

  --state-color: var(--primary);
  --state-glow: var(--primary-glow);
}

[data-state="idle"]      { --state-color: var(--steel);   --state-glow: rgba(90,143,168,0.3); }
[data-state="listening"] { --state-color: var(--primary); --state-glow: var(--primary-glow); }
[data-state="thinking"]  { --state-color: var(--amber);   --state-glow: var(--amber-glow); }
[data-state="speaking"]  { --state-color: var(--aqua);    --state-glow: var(--aqua-glow); }

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'IBM Plex Sans KR', sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* ── 우주 배경 캔버스 ── */
#space {
  position: fixed;
  inset: 0;
  z-index: 0;
  display: block;
}

/* ── 성운 글로우 (CSS 그라데이션 레이어) ── */
.nebula {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(ellipse 40% 50% at 25% 30%, rgba(0, 100, 140, 0.18), transparent 60%),
    radial-gradient(ellipse 35% 45% at 75% 65%, rgba(60, 30, 120, 0.15), transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 80%, rgba(0, 180, 160, 0.10), transparent 70%);
  animation: nebulaDrift 30s ease-in-out infinite alternate;
}
@keyframes nebulaDrift {
  0%   { transform: scale(1) translate(0, 0); opacity: 0.8; }
  100% { transform: scale(1.15) translate(2%, -2%); opacity: 1; }
}

/* ── 비네팅 ── */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 35%, rgba(2,4,12,0.5) 75%, rgba(2,4,12,0.92) 100%);
}

/* ── 코너 프레임 ── */
.frame {
  position: fixed;
  width: 54px; height: 54px;
  z-index: 20;
  pointer-events: none;
}
.frame::before, .frame::after {
  content: '';
  position: absolute;
  background: var(--state-color);
  filter: drop-shadow(0 0 6px var(--state-glow));
  transition: background 0.6s ease;
}
.frame::before { width: 13px; height: 1.5px; }
.frame::after  { width: 1.5px; height: 13px; }
.frame.tl { top: 26px; left: 26px; }
.frame.tl::before, .frame.tl::after { top: 0; left: 0; }
.frame.tr { top: 26px; right: 26px; }
.frame.tr::before { top: 0; right: 0; } .frame.tr::after { top: 0; right: 0; }
.frame.bl { bottom: 26px; left: 26px; }
.frame.bl::before, .frame.bl::after { bottom: 0; left: 0; }
.frame.br { bottom: 26px; right: 26px; }
.frame.br::before { bottom: 0; right: 0; } .frame.br::after { bottom: 0; right: 0; }

/* ── 상단 바 ── */
.top {
  position: fixed;
  top: 40px; left: 60px; right: 60px;
  z-index: 15;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.brand {
  font-family: 'Audiowide', sans-serif;
  font-size: 26px;
  letter-spacing: 0.2em;
  color: var(--state-color);
  text-shadow: 0 0 24px var(--state-glow);
  transition: color 0.6s ease, text-shadow 0.6s ease;
  position: relative;
}
.brand::after {
  content: '';
  position: absolute;
  top: 50%; right: -16px;
  width: 6px; height: 6px;
  background: var(--state-color);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--state-color);
  transform: translateY(-50%);
  animation: heartbeat 1.5s ease-in-out infinite;
}
@keyframes heartbeat {
  0%,100% { opacity: 0.4; transform: translateY(-50%) scale(0.85); }
  50%     { opacity: 1;   transform: translateY(-50%) scale(1.1); }
}

.top-data {
  display: flex;
  gap: 32px;
  font-family: 'JetBrains Mono', monospace;
}
.top-data > div { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
.top-data .label { color: var(--text-muted); font-size: 9px; letter-spacing: 0.28em; }
.top-data .value { color: var(--text-secondary); font-size: 12px; letter-spacing: 0.1em; }

/* ── 중앙 비주얼라이저 ── */
.center {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.viz {
  position: relative;
  width: 600px;
  height: 600px;
}
.viz-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }

.ring {
  fill: none;
  stroke: var(--state-color);
  stroke-width: 0.7;
  filter: drop-shadow(0 0 3px var(--state-glow));
  transition: stroke 0.8s cubic-bezier(0.4,0,0.2,1), opacity 0.8s ease;
}
.ring.r1 { opacity: 0.18; }
.ring.r2 { opacity: 0.3; }
.ring.r3 { opacity: 0.45; }

[data-state="thinking"] .ring.r1 { stroke-dasharray: 4 6; animation: rcw 14s linear infinite; transform-origin: center; transform-box: fill-box; }
[data-state="thinking"] .ring.r2 { stroke-dasharray: 3 4; animation: rccw 10s linear infinite; transform-origin: center; transform-box: fill-box; }
[data-state="thinking"] .ring.r3 { stroke-dasharray: 2 5; animation: rcw 7s linear infinite; transform-origin: center; transform-box: fill-box; }
@keyframes rcw  { to { transform: rotate(360deg); } }
@keyframes rccw { to { transform: rotate(-360deg); } }

.wave-line {
  stroke: var(--state-color);
  stroke-width: 1.6;
  stroke-linecap: round;
  filter: drop-shadow(0 0 4px var(--state-glow));
  transition: stroke 0.6s ease;
}
.core {
  fill: var(--state-color);
  filter: drop-shadow(0 0 10px var(--state-color)) drop-shadow(0 0 24px var(--state-glow));
  transition: fill 0.7s cubic-bezier(0.4,0,0.2,1);
  animation: corePulse 3.2s ease-in-out infinite;
  transform-origin: center; transform-box: fill-box;
}
.core-inner {
  fill: #fff;
  opacity: 0.85;
  filter: drop-shadow(0 0 6px var(--state-color));
  animation: corePulse 3.2s ease-in-out infinite reverse;
  transform-origin: center; transform-box: fill-box;
}
.core-halo {
  fill: var(--state-color);
  opacity: 0.06;
  filter: blur(12px);
  transition: fill 0.7s ease;
  animation: haloPulse 3.2s ease-in-out infinite;
  transform-origin: center; transform-box: fill-box;
}
.core-halo2 {
  fill: var(--state-color);
  opacity: 0.12;
  filter: blur(6px);
  transition: fill 0.7s ease;
  animation: haloPulse 3.2s ease-in-out infinite;
  transform-origin: center; transform-box: fill-box;
}
@keyframes corePulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%     { transform: scale(1.06); opacity: 0.95; }
}
@keyframes haloPulse {
  0%,100% { transform: scale(1); opacity: 0.06; }
  50%     { transform: scale(1.18); opacity: 0.14; }
}
.core-ring {
  fill: none;
  stroke: rgba(255,255,255,0.5);
  stroke-width: 0.5;
  transition: stroke 0.6s ease;
}
.angle-marker { fill: var(--state-color); opacity: 0.5; filter: drop-shadow(0 0 2px var(--state-glow)); }
.particle { fill: var(--state-color); opacity: 0; filter: drop-shadow(0 0 2px var(--state-color)); }

.viz-label {
  position: absolute;
  bottom: 40px; left: 50%;
  transform: translateX(-50%);
  text-align: center;
  width: 100%;
}

/* ── 센서 데이터 패널 (수치 / 플로터 독립 2개) ── */
.data-panel {
  position: fixed;
  z-index: 18;
  width: 320px;
  background: rgba(4, 10, 22, 0.82);
  border: 1px solid var(--state-color);
  box-shadow: 0 0 30px var(--state-glow), inset 0 0 30px rgba(0,0,0,0.4);
  border-radius: 4px;
  padding: 18px 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease, top 0.5s cubic-bezier(0.4,0,0.2,1), left 0.5s cubic-bezier(0.4,0,0.2,1), right 0.5s cubic-bezier(0.4,0,0.2,1), bottom 0.5s cubic-bezier(0.4,0,0.2,1), width 0.4s ease;
  font-family: 'JetBrains Mono', monospace;
}
.data-panel.show { opacity: 1; }

/* 크기 3단계 */
.data-panel[data-size="1"] { width: 260px; padding: 14px 16px; }
.data-panel[data-size="2"] { width: 340px; padding: 18px 20px; }
.data-panel[data-size="3"] { width: 440px; padding: 22px 26px; }
.data-panel[data-size="3"] .dp-val .v { font-size: 38px; }
.data-panel[data-size="3"] .dp-plot svg { height: 200px; }
.data-panel[data-size="1"] .dp-val .v { font-size: 24px; }
.data-panel[data-size="1"] .dp-plot svg { height: 110px; }

/* 9개 위치 (프레임 안쪽 여백) */
.data-panel[data-pos="top-left"]      { top: 90px;  bottom:auto; left: 70px;  right: auto; transform: none; }
.data-panel[data-pos="top-center"]    { top: 90px;  bottom:auto; left: 50%;   right: auto; transform: translateX(-50%); }
.data-panel[data-pos="top-right"]     { top: 90px;  bottom:auto; left: auto;  right: 70px; transform: none; }
.data-panel[data-pos="center-left"]   { top: 50%;   bottom:auto; left: 70px;  right: auto; transform: translateY(-50%); }
.data-panel[data-pos="center"]        { top: 50%;   bottom:auto; left: 50%;   right: auto; transform: translate(-50%,-50%); }
.data-panel[data-pos="center-right"]  { top: 50%;   bottom:auto; left: auto;  right: 70px; transform: translateY(-50%); }
.data-panel[data-pos="bottom-left"]   { top: auto;  bottom: 110px; left: 70px;  right: auto; transform: none; }
.data-panel[data-pos="bottom-center"] { top: auto;  bottom: 110px; left: 50%;   right: auto; transform: translateX(-50%); }
.data-panel[data-pos="bottom-right"]  { top: auto;  bottom: 110px; left: auto;  right: 70px; transform: none; }
.data-panel .dp-title {
  font-size: 10px; letter-spacing: 0.2em; color: var(--text-muted);
  text-transform: uppercase; margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.data-panel .dp-title .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--state-color); box-shadow: 0 0 8px var(--state-color);
  animation: heartbeat 1.5s ease-in-out infinite;
}
/* 수치 카드 */
.dp-values { display: flex; flex-direction: column; gap: 12px; }
.dp-val { display: flex; align-items: baseline; justify-content: space-between;
  border-bottom: 1px solid rgba(90,143,168,0.18); padding-bottom: 10px; }
.dp-val .k { font-size: 13px; color: var(--text-secondary); letter-spacing: 0.05em; }
.dp-val .v { font-size: 30px; font-weight: 500; color: var(--state-color);
  text-shadow: 0 0 16px var(--state-glow); font-family: 'Orbitron', monospace; }
/* 플로터 */
.dp-plot { margin-top: 6px; }
.dp-plot svg { width: 100%; height: 150px; display: block; }
.dp-plot .pl-axis { stroke: rgba(90,143,168,0.25); stroke-width: 0.5; }
.dp-plot .pl-line { fill: none; stroke-width: 1.6; filter: drop-shadow(0 0 4px var(--state-glow)); }
.dp-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
.dp-legend .lg { font-size: 10px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; }
.dp-legend .lg .sw { width: 10px; height: 2px; display: inline-block; }
.viz-label-state {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.42em;
  color: var(--state-color);
  text-shadow: 0 0 18px var(--state-glow);
  transition: color 0.6s ease, text-shadow 0.6s ease;
  margin-bottom: 8px;
}
.viz-label-desc {
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.18em;
  font-weight: 300;
}

/* ── 응답 텍스트 (하단 중앙) ── */
.response {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  width: min(820px, 80vw);
  text-align: center;
  min-height: 30px;
}
.response-text {
  font-size: 17px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--text-primary);
  text-shadow: 0 0 20px rgba(0,0,0,0.8);
}
.response-text .cursor {
  display: inline-block;
  width: 8px; height: 18px;
  background: var(--state-color);
  margin-left: 3px;
  vertical-align: text-bottom;
  animation: blink 0.7s steps(1) infinite;
  box-shadow: 0 0 6px var(--state-color);
}
@keyframes blink { 50% { opacity: 0; } }

/* ── 하단 힌트 ── */
.hint {
  position: fixed;
  bottom: 44px; left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}
.hint .key {
  color: var(--state-color);
  border: 1px solid var(--state-color);
  border-radius: 3px;
  padding: 2px 8px;
  margin: 0 2px;
}

/* ── 버전 (왼쪽 아래) ── */
.version {
  position: fixed;
  bottom: 44px; left: 60px;
  z-index: 15;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}

/* ── 상태 컨트롤 (디버그용, 작게 우하단) ── */
.controls {
  position: fixed;
  bottom: 40px; right: 60px;
  z-index: 15;
  display: flex;
  gap: 2px;
}
.ctrl-btn {
  padding: 6px 10px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: all 0.3s ease;
}
.ctrl-btn:hover { color: var(--text-secondary); }
.ctrl-btn.active { color: var(--state-color); }

@media (max-width: 1000px) {
  .viz { width: 90vw; height: 90vw; max-width: 500px; max-height: 500px; }
  .top { left: 30px; right: 30px; top: 30px; }
}
</style>
</head>
<body data-state="idle">

<canvas id="space"></canvas>
<div class="nebula"></div>
<div class="vignette"></div>

<div class="frame tl"></div>
<div class="frame tr"></div>
<div class="frame bl"></div>
<div class="frame br"></div>

<div class="top">
  <div class="brand">E.D.D.I.E</div>
  <div class="top-data">
    <div><div class="label">USER</div><div class="value">정혁님</div></div>
    <div><div class="label">UPTIME</div><div class="value" id="uptime">00:00:00</div></div>
    <div><div class="label">CLOCK</div><div class="value" id="clock">--:--:--</div></div>
  </div>
</div>

<div class="center">
  <div class="viz">
    <svg class="viz-svg" viewBox="-300 -300 600 600" preserveAspectRatio="xMidYMid meet">
      <g class="outer-frame" id="outer-frame"></g>
      <circle class="ring r1" cx="0" cy="0" r="250"/>
      <circle class="ring r2" cx="0" cy="0" r="185"/>
      <circle class="ring r3" cx="0" cy="0" r="125"/>
      <g id="waveform"></g>
      <g id="particles"></g>
      <circle class="core-halo" cx="0" cy="0" r="48"/>
      <circle class="core-halo2" cx="0" cy="0" r="34"/>
      <circle class="core" cx="0" cy="0" r="20"/>
      <circle class="core-inner" cx="0" cy="0" r="9"/>
      <circle class="core-ring" cx="0" cy="0" r="22"/>
      <circle class="core-ring" cx="0" cy="0" r="32" stroke-opacity="0.25"/>
    </svg>
    <div class="viz-label">
      <div class="viz-label-state" id="state-label">대기</div>
      <div class="viz-label-desc" id="state-desc">음성 명령 대기 중</div>
    </div>
  </div>
</div>

<div class="response">
  <div class="response-text" id="response-text"></div>
</div>

<div class="data-panel" id="panel-value" data-pos="center-left" data-size="2">
  <div class="dp-title"><span>SENSOR VALUE</span><span class="dot"></span></div>
  <div id="dp-value-body"></div>
</div>
<div class="data-panel" id="panel-plot" data-pos="center-right" data-size="2">
  <div class="dp-title"><span>SERIAL PLOTTER</span><span class="dot"></span></div>
  <div id="dp-plot-body"></div>
</div>

<div class="hint">
  <span class="key">SPACE</span> 녹음 시작 / 종료
</div>

<div class="version">EDDIE v0.2 · DSN-001</div>

<div class="controls">
  <button class="ctrl-btn active" data-state="idle">IDLE</button>
  <button class="ctrl-btn" data-state="listening">LISTEN</button>
  <button class="ctrl-btn" data-state="thinking">THINK</button>
  <button class="ctrl-btn" data-state="speaking">SPEAK</button>
</div>

<script>
// ── 상태 메타 ──
const STATES = {
  idle:      { label: '대기',       desc: '음성 명령 대기 중' },
  listening: { label: 'LISTENING',  desc: '음성 입력 수신 중' },
  thinking:  { label: 'THINKING',   desc: '분석 중' },
  speaking:  { label: 'SPEAKING',   desc: '응답 중' },
};

let currentState = 'idle';

// ── 우주 배경 (별 필드, parallax) ──
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initStars();
}
function initStars() {
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 6000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      z: Math.random(),  // 깊이 (parallax)
      r: Math.random() * 1.2 + 0.2,
      tw: Math.random() * Math.PI * 2,  // twinkle phase
    });
  }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── SVG 각도 마커 ──
const outerFrame = document.getElementById('outer-frame');
const NUM_MARKERS = 24;
for (let i = 0; i < NUM_MARKERS; i++) {
  const a = (i / NUM_MARKERS) * Math.PI * 2 - Math.PI / 2;
  const r1 = 272, r2 = i % 6 === 0 ? 264 : 268;
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', Math.cos(a)*r1); line.setAttribute('y1', Math.sin(a)*r1);
  line.setAttribute('x2', Math.cos(a)*r2); line.setAttribute('y2', Math.sin(a)*r2);
  line.setAttribute('class', 'angle-marker');
  line.setAttribute('stroke', 'currentColor');
  line.setAttribute('stroke-width', i % 6 === 0 ? '1.5' : '0.8');
  line.style.color = 'var(--state-color)';
  outerFrame.appendChild(line);
}
outerFrame.style.transformOrigin = 'center';
outerFrame.style.animation = 'rcw 60s linear infinite';

// ── 360 파형 ──
const waveform = document.getElementById('waveform');
const NUM_LINES = 80;
const wfLines = [];
for (let i = 0; i < NUM_LINES; i++) {
  const angle = (i / NUM_LINES) * Math.PI * 2;
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('class', 'wave-line');
  waveform.appendChild(line);
  wfLines.push({ el: line, angle, phase: Math.random() * Math.PI * 2, amp: 2, prevAmp: 2 });
}

// ── 입자 ──
const particlesG = document.getElementById('particles');
const particles = [];
for (let i = 0; i < 24; i++) {
  const p = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  p.setAttribute('class', 'particle');
  p.setAttribute('r', 1.5 + Math.random() * 1.5);
  particlesG.appendChild(p);
  particles.push({ el: p, angle: (i/24)*Math.PI*2, radius: 95, targetRadius: 95, speed: 0.3+Math.random()*0.7, offset: Math.random()*Math.PI*2 });
}

// ── 시계 ──
const clockEl = document.getElementById('clock');
const uptimeEl = document.getElementById('uptime');
const startTime = Date.now();
function tickClock() {
  const now = new Date();
  clockEl.textContent = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
  const el = Math.floor((Date.now()-startTime)/1000);
  uptimeEl.textContent = [Math.floor(el/3600), Math.floor((el%3600)/60), el%60].map(n => String(n).padStart(2,'0')).join(':');
}
tickClock(); setInterval(tickClock, 1000);

// ── 메인 루프 ──
let frame = 0;
function animate() {
  frame++;
  const t = frame * 0.016;

  // 우주 배경
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const drift = (1 - s.z) * 0.15;  // 가까운 별이 더 빨리
    s.y += drift;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    const tw = 0.5 + 0.5 * Math.sin(t * 1.5 + s.tw);
    const alpha = (0.2 + s.z * 0.6) * tw;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * (0.6 + s.z * 0.6), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${180+s.z*40}, ${220+s.z*20}, 255, ${alpha})`;
    ctx.fill();
  }

  // 파형 진폭
  let baseAmp, jitter, freq, ph;
  if (currentState === 'idle')      { baseAmp=8;  jitter=2;  freq=0.6; ph=0.04; }
  else if (currentState === 'listening') { baseAmp=24; jitter=12; freq=1.8; ph=0.1; }
  else if (currentState === 'thinking')  { baseAmp=14; jitter=5;  freq=0.9; ph=0.06; }
  else                              { baseAmp=36; jitter=20; freq=2.4; ph=0.14; }

  wfLines.forEach((line, i) => {
    const s1 = Math.sin(t*freq + i*ph + line.phase);
    const s2 = Math.sin(t*freq*1.7 + i*ph*1.3 + line.phase);
    const noise = (Math.random()-0.5)*jitter;
    const target = Math.max(2, baseAmp + s1*(jitter*0.6) + s2*(jitter*0.3) + noise);
    // 부드러운 보간 (이전 값에서 target으로 서서히) → 물결처럼 자연스럽게
    line.amp += (target - line.amp) * 0.18;
    const amp = line.amp;
    const inner = 80, outer = inner + amp;
    const ca = Math.cos(line.angle), sa = Math.sin(line.angle);
    line.el.setAttribute('x1', (ca*inner).toFixed(1));
    line.el.setAttribute('y1', (sa*inner).toFixed(1));
    line.el.setAttribute('x2', (ca*outer).toFixed(1));
    line.el.setAttribute('y2', (sa*outer).toFixed(1));
    // 진폭에 따라 라인 투명도 살짝 변화 (생동감)
    line.el.style.opacity = (0.55 + Math.min(amp/60, 0.45)).toFixed(2);
  });

  // 입자 (thinking)
  const pa = currentState === 'thinking';
  particles.forEach((p) => {
    p.angle += p.speed*0.008;
    if (pa) { p.targetRadius = 150 + Math.sin(t*0.7+p.offset)*35; p.el.style.opacity = 0.5+Math.sin(t*1.2+p.offset)*0.5; }
    else { p.targetRadius = 95; p.el.style.opacity = 0; }
    p.radius += (p.targetRadius - p.radius)*0.08;
    p.el.setAttribute('cx', (Math.cos(p.angle)*p.radius).toFixed(1));
    p.el.setAttribute('cy', (Math.sin(p.angle)*p.radius).toFixed(1));
  });

  requestAnimationFrame(animate);
}
animate();

// ── 상태 전환 ──
let typingTimer = null;
let subtitleBase = '';  // 누적된 이전 문장들 (스트리밍 자막용)
// text: 이번 문장. duration: 이번 문장 음성 길이. append: true면 기존 자막에 이어붙임.
function typeText(text, duration, append) {
  const el = document.getElementById('response-text');
  if (typingTimer) clearInterval(typingTimer);
  if (!append) subtitleBase = '';            // 새 응답 → 자막 초기화
  const prefix = subtitleBase ? subtitleBase + ' ' : '';
  let i = 0;
  // duration(초)이 주어지면 이번 문장 음성 길이에 맞춰 타이핑 속도 계산
  let interval = 35;
  if (duration && duration > 0 && text.length > 0) {
    interval = Math.max(12, (duration * 1000 * 0.7) / text.length);
  }
  el.innerHTML = prefix + '<span class="cursor"></span>';
  typingTimer = setInterval(() => {
    if (i >= text.length) {
      clearInterval(typingTimer);
      subtitleBase = (prefix + text).trim();  // 이번 문장을 누적에 합침
      return;
    }
    el.innerHTML = prefix + text.slice(0, i+1) + '<span class="cursor"></span>';
    i++;
  }, interval);
}

function setState(name) {
  if (!STATES[name]) return;
  currentState = name;
  document.body.dataset.state = name;
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.toggle('active', b.dataset.state === name));
  document.getElementById('state-label').textContent = STATES[name].label;
  document.getElementById('state-desc').textContent = STATES[name].desc;
  if (name === 'idle') document.getElementById('response-text').innerHTML = '';
}

document.querySelectorAll('.ctrl-btn').forEach(btn => {
  btn.addEventListener('click', () => setState(btn.dataset.state));
});

setState('idle');

// ── 센서 데이터 패널 (수치 / 플로터 독립 2개) ──
const PLOT_COLORS = ['#00FFE5', '#00D9FF', '#FFB845', '#7FE0A0', '#FF6B9D'];

function showPanel(id)  { document.getElementById(id).classList.add('show'); }
function hidePanel(id)  { document.getElementById(id).classList.remove('show'); }
function movePanel(id, position) {
  const valid = ['top-left','top-center','top-right','center-left','center',
                 'center-right','bottom-left','bottom-center','bottom-right'];
  const pos = valid.includes(position) ? position : 'center-right';
  document.getElementById(id).setAttribute('data-pos', pos);
  resolveOverlap();  // 이동 후 겹침 검사
}

// 크기 3단계: 1(작음)~3(큼), up/down은 현재 단계에서 증감
function resizePanel(id, size) {
  const el = document.getElementById(id);
  const cur = parseInt(el.getAttribute('data-size') || '2', 10);
  const map = { small:1, medium:2, large:3 };
  let next;
  if (size === 'up')        next = cur + 1;
  else if (size === 'down') next = cur - 1;
  else if (map[size])       next = map[size];
  else                      next = parseInt(size, 10) || cur;
  next = Math.max(1, Math.min(3, next));  // 1~3 범위
  el.setAttribute('data-size', String(next));
  resolveOverlap();  // 크기 바뀌면 겹침 재검사
}

// 겹침 자동 방지: 두 패널이 '정확히 같은 위치'일 때만 세로로 분리.
// (사용자가 명시적으로 top-right/bottom-right처럼 다르게 보냈으면 존중)
function resolveOverlap() {
  const v = document.getElementById('panel-value');
  const p = document.getElementById('panel-plot');
  if (!v.classList.contains('show') || !p.classList.contains('show')) return;
  const vp = v.getAttribute('data-pos');
  const pp = p.getAttribute('data-pos');
  if (vp === pp) {
    // 완전히 같은 칸 → value 위, plot 아래로 자동 분리
    const col = (vp.split('-')[1]) || 'center';
    v.setAttribute('data-pos', 'top-' + col);
    p.setAttribute('data-pos', 'bottom-' + col);
  }
}

// target(value/plot/all)을 패널 id 배열로
function targetIds(target) {
  if (target === 'value') return ['panel-value'];
  if (target === 'plot')  return ['panel-plot'];
  return ['panel-value', 'panel-plot'];  // all
}

function renderValuePanel(values) {
  const body = document.getElementById('dp-value-body');
  let html = '<div class="dp-values">';
  for (const [k, v] of Object.entries(values)) {
    const num = (typeof v === 'number') ? (Number.isInteger(v) ? v : v.toFixed(1)) : v;
    html += `<div class="dp-val"><span class="k">${k}</span><span class="v">${num}</span></div>`;
  }
  html += '</div>';
  body.innerHTML = html;
  showPanel('panel-value');
}

function renderPlotPanel(series) {
  const body = document.getElementById('dp-plot-body');
  const W = 280, H = 140, pad = 6;
  let allVals = [];
  Object.values(series).forEach(arr => allVals = allVals.concat(arr));
  if (allVals.length === 0) { body.innerHTML = '<div style="color:var(--text-muted);font-size:11px;">데이터 없음</div>'; showPanel('panel-plot'); return; }
  let mn = Math.min(...allVals), mx = Math.max(...allVals);
  if (mn === mx) { mn -= 1; mx += 1; }
  const labels = Object.keys(series);

  function pathFor(arr) {
    if (arr.length < 2) {
      const y = H - pad - ((arr[0]-mn)/(mx-mn))*(H-2*pad);
      return `M ${pad} ${y.toFixed(1)} L ${W-pad} ${y.toFixed(1)}`;
    }
    return arr.map((v, i) => {
      const x = pad + (i/(arr.length-1))*(W-2*pad);
      const y = H - pad - ((v-mn)/(mx-mn))*(H-2*pad);
      return `${i===0?'M':'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
    }).join(' ');
  }

  let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
  svg += `<line class="pl-axis" x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}"/>`;
  svg += `<line class="pl-axis" x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}"/>`;
  labels.forEach((l, i) => {
    svg += `<path class="pl-line" d="${pathFor(series[l])}" stroke="${PLOT_COLORS[i%PLOT_COLORS.length]}"/>`;
  });
  svg += `</svg>`;

  let legend = '<div class="dp-legend">';
  labels.forEach((l, i) => {
    legend += `<span class="lg"><span class="sw" style="background:${PLOT_COLORS[i%PLOT_COLORS.length]}"></span>${l}</span>`;
  });
  legend += `</div>`;
  legend += `<div style="font-size:9px;color:var(--text-muted);margin-top:6px;">범위 ${mn.toFixed(1)} ~ ${mx.toFixed(1)}</div>`;

  body.innerHTML = `<div class="dp-plot">${svg}</div>${legend}`;
  showPanel('panel-plot');
}

// ── Electron 연동 ──
if (window.eddieAPI && typeof window.eddieAPI.onStateUpdate === 'function') {
  window.eddieAPI.onStateUpdate((data) => {
    if (data && data.state) {
      setState(data.state);
      if (data.state === 'speaking' && data.detail && data.detail.text) {
        typeText(data.detail.text, data.detail.duration, data.detail.append);
      }
    }
  });
  // 센서 데이터 수신 (파일 채널) → 공용 handleData
  if (typeof window.eddieAPI.onDataUpdate === 'function') {
    const hudLoadTime = Date.now() / 1000;
    window.eddieAPI.onDataUpdate((data) => {
      if (!data) return;
      if (data.ts && data.ts < hudLoadTime - 1 && data.kind !== 'hide') return;
      handleData(data);
    });
  }
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (window.eddieAPI.sendCommand) window.eddieAPI.sendCommand('record');
    }
  });
}

// ── 데이터 처리 (파일 채널 + WebSocket 공용) ──
function handleData(data) {
  if (!data) return;
  if (data.kind === 'value' && data.values) renderValuePanel(data.values);
  else if (data.kind === 'plot' && data.series) renderPlotPanel(data.series);
  else if (data.kind === 'monitor') {
    // 실시간 모니터링: 수치 + 그래프 동시 갱신
    if (data.values) renderValuePanel(data.values);
    if (data.series && Object.keys(data.series).length) renderPlotPanel(data.series);
  }
  else if (data.kind === 'monitor_error') { /* 음성으로 별도 안내됨 */ }
  else if (data.kind === 'hide') targetIds(data.target).forEach(hidePanel);
  else if (data.kind === 'move') targetIds(data.target).forEach(id => movePanel(id, data.position));
  else if (data.kind === 'resize') targetIds(data.target).forEach(id => resizePanel(id, data.size));
}

// ── WebSocket 실시간 채널 (센서 모니터링 전용) ──
(function connectDataWS() {
  let ws = null, reconnectTimer = null;
  function connect() {
    try { ws = new WebSocket('ws://127.0.0.1:8765'); }
    catch (e) { scheduleReconnect(); return; }
    ws.onmessage = (ev) => { try { handleData(JSON.parse(ev.data)); } catch (e) {} };
    ws.onclose = () => scheduleReconnect();
    ws.onerror = () => { try { ws.close(); } catch (e) {} };
  }
  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 1500);
  }
  connect();
})();
</script>
